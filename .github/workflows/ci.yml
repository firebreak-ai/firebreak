name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdl-workflow-tests:
    name: SDL Workflow Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SDL workflow tests
        run: |
          failed=0
          for test in tests/sdl-workflow/test-*.sh; do
            echo "::group::$(basename "$test")"
            if bash "$test"; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::$(basename "$test") failed"
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "$failed test file(s) failed"
            exit 1
          fi

  installer-tests:
    name: Installer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run installer tests
        run: |
          failed=0
          for test in tests/installer/test-*.sh; do
            echo "::group::$(basename "$test")"
            if bash "$test"; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::$(basename "$test") failed"
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "$failed test file(s) failed"
            exit 1
          fi
